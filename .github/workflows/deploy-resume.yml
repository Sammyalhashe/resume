name: Deploy Resume to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Build resume
        run: nix build -o public/resume.pdf && cp public/resume.pdf public/index.pdf

      - name: Create index page
        run: |
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Sammy Al Hashemi - Resume</title>
            <style>
              body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 80px auto; text-align: center; }
              h1 { font-size: 1.5em; }
              a { color: #0366d6; text-decoration: none; font-size: 1.2em; }
              a:hover { text-decoration: underline; }
              embed { width: 100%; height: 80vh; margin-top: 40px; border: 1px solid #ddd; }
            </style>
          </head>
          <body>
            <h1>Sammy Al Hashemi</h1>
            <p><a href="resume.pdf" download>Download Resume (PDF)</a></p>
            <embed src="resume.pdf" type="application/pdf">
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
